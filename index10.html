<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCORD | LENDER INTERNAL TOOL</title>
    <link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/696023487059154b5cfb7860/698e84a757bbd3e3683dee2a_favicon-google.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #020101;
            --concord-crimson: #9e0b0f;
            --concord-orange: #d16b1d;
            --glass: rgba(6, 2, 2, 0.98);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--void); color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #matrix-canvas { opacity: 0.5; }
        #burst-canvas { z-index: 100; pointer-events: none; }

        #status-banner, #terminal-footer {
            position: fixed; left: 0; right: 0; height: 35px;
            z-index: 200; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            align-items: center;
            padding: 0 20px; font-family: 'Orbitron'; font-size: 9px;
            letter-spacing: 1.5px;
        }

        #status-banner { 
            top: 0; 
            background: var(--concord-crimson); 
            color: white;
            border-bottom: 2px solid var(--concord-orange); 
            display: none; 
        }
        
        #terminal-footer { 
            bottom: 0; 
            background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(209, 107, 29, 0.3); 
            text-transform: uppercase;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .segment-left { text-align: left; }
        .segment-center { text-align: center; white-space: nowrap; }
        .segment-right { text-align: right; }
        
        #terminal-footer b, #terminal-footer strong { 
            color: var(--concord-orange); 
            font-weight: 700; 
            text-shadow: 0 0 5px rgba(209, 107, 29, 0.2);
        }
        
        #status-banner b { color: #fff; }

        .status-dot {
            height: 6px; width: 6px; background-color: var(--concord-orange);
            border-radius: 50%; display: inline-block;
            margin-right: 8px; animation: blink 1.5s infinite;
            box-shadow: 0 0 8px var(--concord-orange);
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #logo-trigger {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 112px; height: 112px; z-index: 101; cursor: pointer;
            opacity: 0; animation: logoFadeIn 2s forwards, logoPulse 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        @keyframes logoFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes logoPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        #logo-trigger img { 
            width: 100%; filter: drop-shadow(0 0 10px rgba(209, 107, 29, 0.5)); 
            transition: filter 0.3s ease;
        }
        #logo-trigger:hover img { filter: drop-shadow(0 0 25px var(--concord-orange)) brightness(1.2); }
        #logo-trigger:hover { transform: translate(-50%, -50%) scale(1.15); animation-play-state: paused; }

        .bursting #logo-trigger { display: none; }

        #view-wrapper {
            position: relative; z-index: 50; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            padding-bottom: 40px; 
        }
        #login-gate {
            width: 420px; padding: 50px; background: var(--glass);
            border-left: 4px solid var(--concord-crimson);
            box-shadow: 0 0 120px #000; display: none; text-align: left;
        }
        
        .brand-header { border-bottom: 1px solid #333; margin-bottom: 30px; padding-bottom: 20px; }
        
        .brand-header .title-container { display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }
        .brand-header .login-logo { width: 24px; height: 24px; filter: drop-shadow(0 0 5px var(--concord-orange)); }
        
        .brand-header h2 { font-family: 'Orbitron'; font-size: 18px; margin: 0; color: #fff; letter-spacing: 4px; font-weight: 700; }
        .brand-header span { font-size: 9px; color: var(--concord-orange); letter-spacing: 2px; text-transform: uppercase; }

        .sys-info { color: #555; font-size: 9px; margin-bottom: 30px; line-height: 1.6; }
        .input-group { margin-bottom: 25px; position: relative; }
        
        input {
            width: 100%; padding: 14px; background: #0a0a0a; border: 1px solid #222;
            color: var(--concord-orange); outline: none; font-family: 'Share Tech Mono'; font-size: 16px; box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--concord-crimson); background: #000; box-shadow: inset 0 0 10px #9e0b0f22; }

        .toggle-eye { position: absolute; right: 15px; bottom: 12px; cursor: pointer; color: #444; font-size: 14px; user-select: none; }
        #enterBtn {
            width: 100%; padding: 18px; background: var(--concord-crimson); color: #fff;
            border: none; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 3px; font-weight: bold;
            margin-top: 10px; transition: 0.2s;
        }
        #enterBtn:hover { background: #c10d12; box-shadow: 0 0 20px rgba(158, 11, 15, 0.4); }

        #error-overlay {
            position: fixed; inset: 0; background: rgba(158, 11, 15, 0.15);
            z-index: 1000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
            backdrop-filter: blur(10px); border: 20px solid var(--concord-crimson);
            animation: strobe 0.1s infinite;
        }
        @keyframes strobe { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        #error-overlay h1 { font-family: 'Orbitron'; font-size: 5vw; color: #fff; margin: 0; text-shadow: 0 0 20px #f00; }
        #error-overlay p { font-size: 1.5vw; letter-spacing: 5px; color: #fff; }

        #content-frame {
            position: fixed; top: 37px; left: 0; right: 0; bottom: 0;
            width: 100%; height: calc(100% - 37px);
            background: var(--void); z-index: 40;
            display: none; border: none;
        }
        @keyframes fail-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div id="error-overlay">
    <h1>CRITICAL FAILURE</h1>
    <p id="error-msg">ACCESS_CREDENTIALS_MISSING</p>
</div>

<div id="status-banner">
    <div class="segment-left">ID <b id="banner-user">---</b></div>
    <div class="segment-center">CONCORD <b>LENDER INTERNAL TOOL</b></div>
    <div class="segment-right" id="display-clock">00:00:00</div>
</div>

<canvas id="matrix-canvas"></canvas>
<canvas id="burst-canvas"></canvas>

<div id="logo-trigger">
    <img id="logo-img" src="https://cdn.prod.website-files.com/696023487059154b5cfb7860/698e84a757bbd3e3683dee2a_favicon-google.png">
</div>

<div id="view-wrapper">
    <div id="login-gate">
        <div class="brand-header">
            <div class="title-container">
                <img src="https://cdn.prod.website-files.com/696023487059154b5cfb7860/698e84a757bbd3e3683dee2a_favicon-google.png" class="login-logo" alt="Logo">
                <h2>CONCORD</h2>
                <span>Lender Internal Tool</span>
            </div>
        </div>
        
        <div class="sys-info">
            NETWORK_IP: <span id="ip-address" style="color: var(--concord-crimson)">FETCHING...</span>
        </div>

        <form id="login-form" onsubmit="attemptLogin(event)" novalidate>
            <div class="input-group">
                <input type="text" id="interlink-id" name="username" placeholder="INTERLINK ID" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="passkey" name="password" placeholder="PASSWORD" autocomplete="current-password">
                <span class="toggle-eye" id="eyeToggle" onclick="togglePass()">[ SHOW ]</span>
            </div>
            <button type="submit" id="enterBtn">LOG IN</button>
        </form>
        <div id="err" style="color:var(--concord-crimson); font-size:10px; margin-top:20px; font-family: 'Orbitron'; min-height: 15px;"></div>
    </div>
</div>

<iframe id="content-frame"></iframe>

<div id="terminal-footer">
    <div class="segment-left"><span class="status-dot"></span>SYS: <b>ON</b></div>
    <div class="segment-center">
        <strong>© 2026 </strong><img src="https://cdn.prod.website-files.com/696023487059154b5cfb7860/698e84a757bbd3e3683dee2a_favicon-google.png" width="14" height="14" style="vertical-align: middle; margin-bottom: 3px;">
        <strong>CONCORD FINANCE LLC</strong>
    </div>
    <div class="segment-right">- NOT LOGGED IN</div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const frame = document.getElementById('content-frame');
    const banner = document.getElementById('status-banner');
    const footer = document.getElementById('terminal-footer');
    const errorOverlay = document.getElementById('error-overlay');

    const _0x1a2b = "Q29uY29yZDIwMjYh"; 

    function playTerrorSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const gain = audioCtx.createGain();
        gain.connect(audioCtx.destination);
        
        if (type === 'access') { 
            const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
            osc1.type = 'sawtooth'; osc2.type = 'square';
            osc1.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1);
            osc2.frequency.setValueAtTime(215, audioCtx.currentTime);
            osc1.connect(gain); osc2.connect(gain);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc1.start(); osc2.start(); osc1.stop(audioCtx.currentTime + 0.3); osc2.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'denied') { 
            const carrier = audioCtx.createOscillator(); const modulator = audioCtx.createOscillator(); const modGain = audioCtx.createGain();
            carrier.type = 'sawtooth'; modulator.type = 'square';
            modulator.frequency.value = 50; modGain.gain.value = 100;
            modulator.connect(modGain); modGain.connect(carrier.frequency);
            carrier.frequency.setValueAtTime(60, audioCtx.currentTime); carrier.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            carrier.connect(gain); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            carrier.start(); modulator.start(); carrier.stop(audioCtx.currentTime + 0.5); modulator.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'click') { 
            const osc = audioCtx.createOscillator(); osc.type = 'triangle';
            osc.frequency.setValueAtTime(3000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    const mCanvas = document.getElementById('matrix-canvas');
    const mCtx = mCanvas.getContext('2d');
    mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
    const fontSize = 16;
    const columns = Math.floor(mCanvas.width / fontSize);
    const drops = new Array(columns).fill(-1);
    const directiveDrops = new Array(columns).fill(null);
    let isInitialSweep = true;

    const directives = ["LIQUIDITY_MAXIMIZED", "RISK_MITIGATION_ALPHA", "ASSET_BACKED_SECURITY", "PORTFOLIO_OPTIMIZED", "LENDER_CORE_ACTIVE", "EQUITY_SHIELD_V4", "HIGH_YIELD_TARGET", "CREDIT_DEFAULT_SWAP_OFF", "AMORTIZATION_LOCKED"];

    function triggerScan() {
        const fullSweep = Math.random() > 0.3;
        for (let i = 0; i < drops.length; i++) {
            if (fullSweep || Math.random() > 0.5) {
                drops[i] = 0;
                if (Math.random() > 0.96) {
                    directiveDrops[i] = { text: directives[Math.floor(Math.random() * directives.length)], y: 0, life: 25 };
                }
            }
        }
        if (!isInitialSweep) setTimeout(triggerScan, Math.random() * 5000 + 2000);
    }

    function drawMatrix() {
        mCtx.fillStyle = 'rgba(2, 1, 1, 0.15)';
        mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        for (let i = 0; i < drops.length; i++) {
            if (drops[i] >= 0) {
                mCtx.font = fontSize + 'px monospace'; 
                mCtx.fillStyle = '#c10d12';
                mCtx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * fontSize, drops[i] * fontSize);
                drops[i]++;
                if (drops[i] * fontSize > mCanvas.height) drops[i] = -1;
            }
            if (directiveDrops[i]) {
                const d = directiveDrops[i];
                mCtx.font = '12px Orbitron'; 
                mCtx.fillStyle = '#d16b1d';
                mCtx.fillText(d.text, i * fontSize, d.y * fontSize);
                if (Math.random() > 0.5) d.y++; 
                if (d.y * fontSize > mCanvas.height) { 
                    d.life--; 
                    if (d.life <= 0) directiveDrops[i] = null; 
                }
            }
        }
        if (isInitialSweep && !drops.some(d => d >= 0)) { 
            isInitialSweep = false; 
            setTimeout(triggerScan, 3000); 
        }
    }
    triggerScan(); 
    setInterval(drawMatrix, 40);

    document.getElementById('logo-trigger').onclick = function() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (getComputedStyle(banner).display !== 'none') { location.reload(); return; }
        playTerrorSound('click'); 
        document.body.classList.add('bursting');
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip-address').innerText = d.ip).catch(() => document.getElementById('ip-address').innerText = "127.0.0.1");
        
        const bCanvas = document.getElementById('burst-canvas');
        const bCtx = bCanvas.getContext('2d');
        bCanvas.width = window.innerWidth; bCanvas.height = window.innerHeight;
        let scale = 1, opacity = 1;
        const burst = () => {
            bCtx.clearRect(0,0,bCanvas.width,bCanvas.height); bCtx.globalAlpha = opacity;
            bCtx.drawImage(document.getElementById('logo-img'), bCanvas.width/2 - (56*scale), bCanvas.height/2 - (56*scale), 112*scale, 112*scale);
            scale *= 1.2; opacity -= 0.05;
            if (opacity > 0) requestAnimationFrame(burst);
            else { document.getElementById('login-gate').style.display = 'block'; }
        };
        burst();
    };

    function togglePass() {
        const p = document.getElementById('passkey');
        const e = document.getElementById('eyeToggle');
        p.type = (p.type === 'password') ? 'text' : 'password';
        e.innerText = (p.type === 'password') ? '[ SHOW ]' : '[ HIDE ]';
        playTerrorSound('click');
    }

    function triggerDramaticError(msg) {
        playTerrorSound('denied');
        document.getElementById('error-msg').innerText = msg;
        errorOverlay.style.display = 'flex';
        document.getElementById('login-gate').style.animation = "fail-shake 0.1s 4";
        setTimeout(() => {
            errorOverlay.style.display = 'none';
            document.getElementById('login-gate').style.animation = "";
        }, 2000);
    }

    function attemptLogin(event) {
        if (event) event.preventDefault();
        const p = document.getElementById('passkey').value;
        const interlink = document.getElementById('interlink-id').value;
        if (!interlink.trim()) { triggerDramaticError("MISSING_INTERLINK_ID"); return; }
        if (!p.trim()) { triggerDramaticError("MISSING_PASSKEY_SEQUENCE"); return; }
        
        if (btoa(p) === _0x1a2b) {
            playTerrorSound('access');
            sessionStorage.setItem('crf_verified', 'true');
            document.getElementById('banner-user').innerText = interlink.toUpperCase();
            document.getElementById('view-wrapper').style.display = 'none';
            footer.style.display = 'none'; 
            banner.style.display = 'grid'; 
            frame.src = 'crf-funct.htm';
            frame.style.display = 'block';
        } else {
            triggerDramaticError("INVALID_ENCRYPTION_KEY");
            document.getElementById('err').innerText = "FATAL: AUTH_FAILURE";
        }
    }

    setInterval(() => { 
        const now = new Date();
        document.getElementById('display-clock').innerText = now.toLocaleTimeString(); 
    }, 1000);
</script>
</body>
</html>
