<script>
    (function() {
        const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;
        const now = Date.now();
        const lastRefresh = localStorage.getItem('concord_last_hard_refresh');
        if (!lastRefresh) {
            localStorage.setItem('concord_last_hard_refresh', now);
        } else {
            const timePassed = now - parseInt(lastRefresh);
            if (timePassed >= THREE_DAYS_MS) {
                localStorage.setItem('concord_last_hard_refresh', now);
                window.location.reload(true);
            }
        }
    })();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const frameContainer = document.getElementById('frame-container');
    const banner = document.getElementById('status-banner');
    const footer = document.getElementById('terminal-footer');
    const sidebar = document.getElementById('sidebar-right');
    const errorOverlay = document.getElementById('error-overlay');
    const bCanvas = document.getElementById('burst-canvas');
    const bCtx = bCanvas.getContext('2d');
    const logoImg = document.getElementById('logo-img');
    const loginGate = document.getElementById('login-gate');
    const logoTrigger = document.getElementById('logo-trigger');

    const _0x1a2b = "Q29uY29yZDIwMjYh"; 
    const loadedFrames = {};

    window.addEventListener('message', function(event) {
        const data = event.data;
        if (data.type === 'NOTIFY_ERROR') {
            switch(data.code) {
                case 'NO_PROCEDURE_SELECTED':
                    triggerDramaticError("PROCEDURE_NOT_INITIALIZED");
                    break;
                case 'MISSING_DELIVERY_METHOD':
                    triggerDramaticError("DELIVERY_METHOD_REQUIRED");
                    break;
                default:
                    triggerDramaticError(data.code || "UNKNOWN_SYSTEM_ERROR");
            }
        }
    });

    function playTerrorSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const gain = audioCtx.createGain();
        gain.connect(audioCtx.destination);

        if (type === 'access') { 
            const t = audioCtx.currentTime;
            const sequence = [
                { f: 880, d: 0.05, start: 0 },
                { f: 1046, d: 0.05, start: 0.06 },
                { f: 1318, d: 0.05, start: 0.12 },
                { f: 1760, d: 0.15, start: 0.18 }
            ];
            sequence.forEach(note => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(note.f, t + note.start);
                g.gain.setValueAtTime(0, t + note.start);
                g.gain.linearRampToValueAtTime(0.2, t + note.start + 0.01);
                g.gain.exponentialRampToValueAtTime(0.001, t + note.start + note.d);
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.start(t + note.start);
                osc.stop(t + note.start + note.d);
            });
        } else if (type === 'denied') { 
            const carrier = audioCtx.createOscillator(); const modulator = audioCtx.createOscillator(); const modGain = audioCtx.createGain();
            carrier.type = 'sawtooth'; modulator.type = 'square';
            modulator.frequency.value = 50; modGain.gain.value = 100;
            modulator.connect(modGain); modGain.connect(carrier.frequency);
            carrier.frequency.setValueAtTime(60, audioCtx.currentTime); carrier.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            carrier.connect(gain); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            carrier.start(); modulator.start(); carrier.stop(audioCtx.currentTime + 0.5); modulator.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'click') { 
            const osc = audioCtx.createOscillator(); osc.type = 'triangle';
            osc.frequency.setValueAtTime(3000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }



    

    logoTrigger.onclick = function() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playTerrorSound('click'); 
        document.body.classList.add('bursting');
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => {
                document.getElementById('ip-address').innerText = d.ip;

            })
            .catch(() => {
                const mock = "127.0.0.1";
                document.getElementById('ip-address').innerText = mock;
                document.getElementById('banner-ip').innerText = mock;
            });
        bCanvas.width = window.innerWidth; bCanvas.height = window.innerHeight;
        let scale = 1, opacity = 1;
        const burst = () => {
            bCtx.clearRect(0,0,bCanvas.width,bCanvas.height); bCtx.globalAlpha = opacity;
            bCtx.drawImage(logoImg, bCanvas.width/2 - (56*scale), bCanvas.height/2 - (56*scale), 112*scale, 112*scale);
            scale *= 1.15; opacity -= 0.07;
            if (opacity > 0) requestAnimationFrame(burst);
            else { bCtx.clearRect(0,0,bCanvas.width,bCanvas.height); loginGate.style.display = 'block'; }
        };
        burst();
    };

    function animateBackToLogo() {
        playTerrorSound('click');
        loginGate.style.display = 'none';
        banner.style.display = 'none';
        sidebar.style.display = 'none';
        frameContainer.style.display = 'none';
        frameContainer.innerHTML = ''; 
        Object.keys(loadedFrames).forEach(k => delete loadedFrames[k]);
        document.body.classList.remove('bursting');
        document.getElementById('view-wrapper').style.display = 'flex';
        footer.style.display = 'flex';
        bCanvas.width = window.innerWidth; 
        bCanvas.height = window.innerHeight;
        let scale = 8; 
        let opacity = 0;
        const reverseBurst = () => {
            bCtx.clearRect(0, 0, bCanvas.width, bCanvas.height);
            bCtx.globalAlpha = opacity;
            const currentSize = 112 * scale;
            bCtx.drawImage(logoImg, bCanvas.width/2 - (currentSize/2), bCanvas.height/2 - (currentSize/2), currentSize, currentSize);
            scale *= 0.90; opacity += 0.08;
            if (scale > 1) requestAnimationFrame(reverseBurst);
            else window.location.reload(true); 
        };
        reverseBurst();
    }

    function triggerDramaticError(msg) {
        playTerrorSound('denied');
        document.getElementById('error-msg').innerText = msg;
        errorOverlay.style.display = 'flex';
        if (loginGate.style.display === 'block') {
            loginGate.style.animation = "fail-shake 0.1s 4";
        }
        setTimeout(() => {
            errorOverlay.style.display = 'none';
            loginGate.style.animation = "";
        }, 2000);
    }

    function switchFrame(url) {
        playTerrorSound('click');
        if (!loadedFrames[url]) {
            const newFrame = document.createElement('iframe');
            newFrame.className = 'managed-frame';
            newFrame.src = url;
            frameContainer.appendChild(newFrame);
            loadedFrames[url] = newFrame;
        }
        const currentActive = frameContainer.querySelector('.managed-frame.active');
        if (currentActive && currentActive !== loadedFrames[url]) {
            currentActive.classList.remove('active');
            currentActive.classList.add('prev');
        }
        const allFrames = frameContainer.querySelectorAll('.managed-frame');
        allFrames.forEach(f => {
            if (f !== loadedFrames[url] && f !== currentActive) {
                f.classList.remove('prev');
            }
        });
        setTimeout(() => {
            loadedFrames[url].classList.remove('prev');
            loadedFrames[url].classList.add('active');
        }, 50);
    }

    function attemptLogin(event) {
        if (event) event.preventDefault();
        const p = document.getElementById('passkey').value;
        const interlink = document.getElementById('interlink-id').value;
        if (!interlink.trim()) { triggerDramaticError("MISSING_INTERLINK_ID"); return; }
        if (!p.trim()) { triggerDramaticError("MISSING_PASSKEY_SEQUENCE"); return; }
        if (btoa(p) === _0x1a2b) {
            playTerrorSound('access');
            sessionStorage.setItem('crf_verified', 'true');
            document.getElementById('banner-user').innerText = interlink.toUpperCase();
            document.getElementById('view-wrapper').style.display = 'none';
            footer.style.display = 'none'; 
            banner.style.display = 'flex'; 
            sidebar.style.display = 'flex';
            frameContainer.style.display = 'block';
            frameContainer.classList.add('with-sidebar');
            switchFrame('crf-funct.html');
        } else {
            triggerDramaticError("INVALID_ENCRYPTION_KEY");
            document.getElementById('err').innerText = "FATAL: AUTH_FAILURE";
        }
    }

    setInterval(() => { 
        const now = new Date();
        document.getElementById('clk-h').innerText = String(now.getHours()).padStart(2, '0'); 
        document.getElementById('clk-m').innerText = String(now.getMinutes()).padStart(2, '0'); 
        document.getElementById('clk-s').innerText = String(now.getSeconds()).padStart(2, '0'); 
    }, 1000);
</script>
</body>
</html>
